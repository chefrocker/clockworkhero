name: Release

on:
  push:
    tags:
      - 'v*'   # Auslöser: git tag v1.0.0 && git push --tags

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # Nötig für GitHub Release erstellen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: npm install
        run: npm ci

      - name: Tauri bauen & Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClockworkHero ${{ github.ref_name }}'
          releaseBody: |
            ## Was ist neu?
            _Changelog hier eintragen oder automatisch generieren lassen._
          releaseDraft: false
          prerelease: false
          # Erstellt automatisch latest.json für den Updater
          updaterJsonPreferNsis: true
